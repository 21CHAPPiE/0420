version = 1
revision = 3
requires-python = ">=3.9"
resolution-markers = [
    "python_full_version >= '3.11'",
    "python_full_version == '3.10.*'",
    "python_full_version < '3.10'",
]

[[package]]
name = "agno"
version = "2.5.17"
source = { editable = "../agno-main/libs/agno" }
dependencies = [
    { name = "docstring-parser" },
    { name = "gitpython" },
    { name = "h11" },
    { name = "httpx", extra = ["http2"] },
